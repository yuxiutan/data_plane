# Pipeline: Kafka (raw topics) → NormalizedEvent v1 → Postgres
# Consumes: events.raw.syslog, events.raw.http, events.raw.mqtt
# Transforms to NormalizedEvent schema; inserts into normalized_events table
# TODO: DLQ for invalid messages; strict validation; idempotency (event_id)

input {
  kafka {
    bootstrap_servers => "redpanda:9092"
    topics => ["events.raw.syslog", "events.raw.http", "events.raw.mqtt"]
    codec => json
    group_id => "logstash-normalizer"
    consumer_threads => 1
    decorate_events => true
  }
}

filter {
  # Build NormalizedEvent v1 fields
  uuid {
    target => "event_id"
  }
  mutate {
    add_field => {
      "ts" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}"
      "severity" => 2
      "confidence" => 1.0
    }
  }
  # Use @timestamp for ts if not overridden
  ruby {
    code => "
      ts = event.get('@timestamp')
      event.set('ts', ts.is_a?(LogStash::Timestamp) ? ts.to_iso8601 : ts.to_s) if ts
      event.set('tenant_id', event.get('tenant_id') || 'default')
      event.set('entity_id', event.get('entity_id') || event.get('host') || 'unknown')
      event.set('source', event.get('[@metadata][source]') || event.get('source') || 'http')
      event.set('event_type', event.get('event_type') || 'raw')
      sev = event.get('severity')
      event.set('severity', sev.is_a?(Integer) ? sev : 2)
      conf = event.get('confidence')
      event.set('confidence', conf.is_a?(Numeric) ? conf.to_f : 1.0)
    "
  }
  # Build fields JSONB: extra payload as JSON string (reserved keys stay for JDBC)
  ruby {
    code => "
      h = event.to_hash
      reserved = %w[event_id ts tenant_id entity_id source event_type severity confidence fields fields_json created_at @timestamp @version @metadata]
      f = h.reject { |k,v| reserved.include?(k.to_s) || k.to_s.start_with?('@') }
      event.set('fields_json', f.empty? ? '{}' : f.to_json)
    "
  }
  mutate {
    remove_field => ["@version", "@metadata"]
  }
}

output {
  jdbc {
    driver_jar_path => "/usr/share/logstash/vendor/jar/jdbc/postgresql-42.7.3.jar"
    connection_string => "jdbc:postgresql://postgres:5432/layera?user=layera&password=layera"
    statement => [
      "INSERT INTO normalized_events (event_id, ts, tenant_id, entity_id, source, event_type, severity, confidence, fields) VALUES (?::uuid, ?::timestamptz, ?, ?, ?, ?, ?::int, ?::real, ?::jsonb)",
      "event_id",
      "ts",
      "tenant_id",
      "entity_id",
      "source",
      "event_type",
      "severity",
      "confidence",
      "fields_json"
    ]
  }
}
