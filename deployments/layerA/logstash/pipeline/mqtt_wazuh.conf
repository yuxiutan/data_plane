input {
  # 連接至外部 EMQX Broker
  mqtt {
    hosts => ["wangfalcon.tplinkdns.com"]
    port => 8883
    ssl => true
    # 訂閱所有相關 Topic
    topic => [
      "partner/security/ips",
      "partner/device/status",
      "arista/default/+/state",
      "arista/default/+/telemetry/+"
    ]
    client_id => "logstash_wazuh_ingest"
  }
}

filter {
  # 1. 解析 JSON Payload
  json {
    source => "message"
    target => "parsed_json"
    skip_on_invalid_json => true
  }

  # 2. 處理 Arista 邏輯 (對應原本的 Python Script 2)
  if [topic] =~ /^arista\// {
    ruby {
      code => '
        data = event.get("parsed_json")
        if data
          # --- 邏輯: 產生 UUID (Arista-{clean_ip}) ---
          device_val = data.fetch("device", "unknown")
          
          # 處理 device 可能是 dict 或 string 的情況
          if device_val.is_a?(Hash)
            device_str = device_val.values.first.to_s
          else
            device_str = device_val.to_s
          end

          clean_ip = device_str.gsub(".", "").gsub(":", "")
          custom_uuid = "Arista-#{clean_ip}"
          event.set("uuid", custom_uuid)

          # --- 邏輯: 合併 cmds 列表 ---
          if data["cmds"].is_a?(Array)
            event.set("cmds", data["cmds"].join(", "))
          end

          # --- 邏輯: 設定 event_type ---
          event.set("event_type", "arista_event")
          
          # 將原始資料展平放入 fields (模擬 flatten)
          # Wazuh 其實可以直接讀取巢狀 JSON，這裡我們將處理過的欄位移至頂層
          data.each do |k, v|
            next if k == "cmds" # 已處理
            event.set(k, v)
          end
        end
      '
    }
  }

  # 3. 處理一般 Partner 設備邏輯 (對應原本的 Python Script 1)
  if [topic] =~ /^partner\// {
    # Script 1 只是單純寫入，這裡我們確保它是 JSON 格式
    if [parsed_json] {
      ruby {
        code => '
          event.get("parsed_json").each { |k, v| event.set(k, v) }
        '
      }
    }
  }

  # 清理暫存欄位
  mutate {
    remove_field => ["parsed_json", "message", "mqtt"]
  }
}

output {
  # 輸出至共享目錄，供 Wazuh Agent 讀取
  file {
    path => "/usr/share/logstash/wazuh_buffer/mqtt_events.json"
    codec => "json_lines"
  }
}