# Pipeline: HTTP JSON intake → Kafka (events.raw.http / events.raw.mqtt)
# Input: HTTP 8088 (JSON body)
# If payload.source == "mqtt" → events.raw.mqtt, else → events.raw.http
# TODO: DLQ topic; strict schema validation; rate limiting

input {
  http {
    port => 8088
    codec => json
    additional_codecs => { "application/json" => "json" }
  }
}

filter {
  mutate {
    add_field => { "[@metadata][source]" => "http" }
  }
  # Conditional routing: if source is mqtt, use events.raw.mqtt
  if [source] == "mqtt" {
    mutate { add_field => { "[@metadata][topic]" => "events.raw.mqtt" } }
  } else {
    mutate { add_field => { "[@metadata][topic]" => "events.raw.http" } }
  }
  # Preserve entity_id / tenant_id from payload if present
  if [host] and ![entity_id] {
    mutate { add_field => { "entity_id" => "%{host}" } }
  }
  if ![entity_id] {
    mutate { add_field => { "entity_id" => "unknown" } }
  }
  if ![tenant_id] {
    mutate { add_field => { "tenant_id" => "default" } }
  }
}

output {
  kafka {
    codec => json
    topic_id => "%{[@metadata][topic]}"
    bootstrap_servers => "redpanda:9092"
    message_key => "%{tenant_id}:%{entity_id}"
  }
}
