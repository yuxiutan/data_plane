# Pipeline: Syslog UDP → Wazuh JSON file
# Input: UDP 5140 (RFC3164 syslog)
# Output: /usr/share/logstash/wazuh_buffer/syslog_events.json

input {
  syslog {
    port => 5140
    type => "syslog"
  }
}

filter {
  # Try parse RFC5424/RFC3164 syslog; fallback to keep raw
  grok {
    match => { "message" => [
      "^<%{POSINT:syslog_pri}>%{NUMBER:version} %{TIMESTAMP_ISO8601:syslog_timestamp} %{HOSTNAME:syslog_hostname} %{WORD:syslog_program}(?:\[%{POSINT:syslog_pid}\])? - - %{GREEDYDATA:syslog_message}",
      "^<%{POSINT:syslog_pri}>%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_hostname} %{WORD:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
    ]}
    overwrite => ["message"]
    tag_on_failure => ["_grokparsefailure_sysloginput"]
  }

  if "_grokparsefailure_sysloginput" in [tags] {
    mutate {
      add_field => { "syslog_message" => "%{message}" }
      remove_tag => ["_grokparsefailure_sysloginput"]
    }
  }

  # Always ensure we're not carrying the parse-failure tag downstream
  mutate {
    remove_tag => ["_grokparsefailure_sysloginput"]
  }

  # Ensure timestamp field
  if [syslog_timestamp] {
    date {
      match => ["syslog_timestamp", "ISO8601", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "yyyy-MM-dd'T'HH:mm:ssZ"]
      target => "@timestamp"
      remove_field => ["syslog_timestamp"]
    }
  } else {
    if ![@timestamp] {
      mutate { add_field => { "@timestamp" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}" } }
    }
  }

  mutate {
    add_field => {
      "[@metadata][source]" => "syslog"
      "[@metadata][tenant_id]" => "default"
      "[@metadata][entity_id]" => "%{syslog_hostname}"
      "event_type" => "syslog"
    }
  }

  # Keep original message for Wazuh context
  mutate {
    add_field => { "syslog_raw" => "%{[event][original]}" }
    rename => { "message" => "syslog_text" }
  }
}

output {
  file {
    path => "/usr/share/logstash/wazuh_buffer/syslog_events.json"
    codec => json_lines
  }
}
