# Pipeline: Syslog UDP → Kafka (events.raw.syslog)
# Input: UDP 5140 (RFC3164-style syslog)
# Output: Redpanda topic events.raw.syslog
# TODO: DLQ topic for parse failures; strict validation

input {
  udp {
    port => 5140
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }
}

filter {
  # Keep raw syslog line for Wazuh and downstream use
  mutate {
    add_field => { "syslog_raw" => "%{message}" }
    add_field => { "event_type" => "syslog" }
  }

  # Parse FortiGate style message + metadata tail
  grok {
    match => {
      "message" => [
        "^<%{POSINT:pri}>%{NUMBER:version} %{TIMESTAMP_ISO8601:syslog_time} %{HOSTNAME:syslog_host} %{DATA:syslog_program} - - %{GREEDYDATA:fortigate_body} \|\| srcip=%{IP:srcip} uuid=%{DATA:device_uuid} device_type=%{DATA:device_type} rcvhost=%{GREEDYDATA:rcvhost}",
        "^<%{POSINT:pri}>%{SYSLOGTIMESTAMP:syslog_time} %{HOSTNAME:syslog_host} %{DATA:syslog_program}: %{GREEDYDATA:fortigate_body} \|\| srcip=%{IP:srcip} uuid=%{DATA:device_uuid} device_type=%{DATA:device_type} rcvhost=%{GREEDYDATA:rcvhost}"
      ]
    }
    tag_on_failure => ["_fortigate_grok_failure"]
  }

  if "_fortigate_grok_failure" in [tags] {
    mutate { remove_tag => ["_fortigate_grok_failure"] }
  }

  # Parse key/value pairs inside the fortigate body
  if [fortigate_body] {
    kv {
      source => "fortigate_body"
      field_split => " "
      value_split => "="
      trim_key => "\""
      trim_value => "\""
      target => "fortigate"
      include_brackets => false
    }
  }

  # Remove parse-failure tags so we don't carry errors downstream
  if "_grokparsefailure_sysloginput" in [tags] {
    mutate { remove_tag => ["_grokparsefailure_sysloginput"] }
  }

  # Minimal normalization for timestamp
  if [syslog_time] {
    date {
      match => ["syslog_time", "ISO8601", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "yyyy-MM-dd'T'HH:mm:ssZ", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
      remove_field => ["syslog_time"]
      ignore_failure => true
    }
  }

  if ![@timestamp] {
    mutate { add_field => { "@timestamp" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}" } }
  }

  mutate {
    add_field => {
      "[@metadata][source]"    => "syslog"
      "[@metadata][topic]"     => "events.raw.syslog"
      "[@metadata][tenant_id]" => "default"
      "[@metadata][entity_id]" => "%{srcip}"
    }
  }
  if [host] {
    mutate { add_field => { "[@metadata][entity_id]" => "%{host}" } }
  }
}

output {
  kafka {
    codec => json
    topic_id => "events.raw.syslog"
    bootstrap_servers => "redpanda:9092"
    message_key => "%{[@metadata][tenant_id]}:%{[@metadata][entity_id]}"
  }

  file {
    path => "/usr/share/logstash/wazuh_buffer/syslog_events.log"
    codec => line {
      format => "%{message}"
    }
  }
}
